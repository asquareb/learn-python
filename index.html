<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section>
        <h1>Demo Presentation</h1>
      </section>
      <section>
        <h2>I'm a Sub Heading</h2>
        <p>Here is some content.</p>
        <p>and more content!</p>
      </section>
      <section>
  	<p>This will remain visible for all vertical slides</p>
  	<section>Here is some vertical content</section>
  	<section>and some more</section>
  	<section>more stuff...</section>
      </section>
      <section data-markdown>
	      <textarea data-template>
		      ### Sample Slide using Markdown
	      </textarea>
      </section>
      <section data-markdown="slides/unit1.md"
	      data-separator="^\n---\n$"
	      data-separator-vertical="^\n--\n$"
	      data-separator-notes="^Note:">
      </section>
      <section data-markdown="slides/unit2.md"
	      data-separator="^\n---\n$"
	      data-separator-veritical="^\n--\n$"
	      data-separator-notes="^Note:">
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
  <script>Reveal.initialize({ plugins: [] });</script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script>
	  Reveal.initialize({
		  hash: true,
		  slideNumber: 'c/t',
		  transition: 'slide',
		  plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
	  });
  </script>
</body>
</html>
